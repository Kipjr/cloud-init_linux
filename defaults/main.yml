ubtu22_vm: true
ubtu22_pkg_webmin: true
ubtu22_pkg_snmp: false
ubtu22_portainer_host: true
ubtu22_portainer_agent: true
ubtu22_docker_type: "rootless"
# ubtu22_docker_type: "rootfull"
ubtu22_run_task_configuration: true
ubtu22_run_task_disk: true
ubtu22_run_task_docker: true
ubtu22_run_task_packages: true
ubtu22_run_task_security: true
ubtu22_runcis: false

ubtu22cis_level_2: false
ubtu22cis_disruption_high: false

###
### ubtu22cis variables
###

#  Check ubtu22cis_grub_user password variable has been changed
ubtu22cis_rule_1_4_1: false
# Do not use boot password
ubtu22cis_ask_passwd_to_boot: false
ubtu22cis_set_boot_pass: false

# Do not patch UFW to do default deny
ubtu22cis_rule_4_1_7: false

# "7.1.12 | PATCH | Ensure no files or directories without an owner and a group exist | Set files/directories to configured owner and group"
ubtu22cis_rule_7_1_12: false
ubtu22cis_ownership_adjust: false

# Takes alot of time: Audit SUID/SGID executables | Find SGID executables
ubtu22cis_rule_7_1_13: false

###
### CIS Level 2
###

# keep squashfs
ubtu22cis_rule_1_1_1_6: false
# Disable AppArmor enforcement
ubtu22cis_rule_1_3_1_4: false
ubtu22cis_apparmor_disable: true
ubtu22cis_apparmor_mode: "complain"
#  "6.3.2.2 | PATCH | Ensure audit logs are not automatically deleted"
ubtu22cis_rule_6_3_2_2: false
# "6.3.2.3 | PATCH | Ensure system is disabled when audit logs are full"
ubtu22cis_rule_6_3_2_3: false

# breaks sudo during remediation:  "5.2.4 | PATCH | Ensure users must provide password for privilege escalation"
ubtu22cis_rule_5_2_4: false
#  "5.4.2.4 | PATCH | Ensure root password is set"
ubtu22cis_rule_5_4_2_4: false

###
### Generic
###
ubtu22cis_snmp_server: true
ubtu22cis_nfs_server: false
ubtu22cis_nfs_client: false
ubtu22cis_remote_log_server: "127.0.0.1"
ubtu22cis_sshd_allow_users: "{{ ansible_user_id }}"
