name: Ansible

on: 
  push:
    paths:
      - '**.yml'
      - '**.sh'
      - '**.ps1'
    branches-ignore:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_playbook:
        description: "Run Playbook?"
        required: true
        default: false
        type: boolean
      runner:
        description: "Runner Image"
        required: true    
        type: choice
        default: "ubuntu-latest"
        options:
          - ubuntu-latest
          - ubuntu-22.04

      ansible_verbose:
        description: "Verbose mode"
        required: true
        default: false
        type: boolean
jobs:
  lint:
    runs-on:  ${{ inputs.runner }}
    outputs:
      lint_success: ${{ steps.lint_check.outputs.lint_success }}
      python-version: ${{ matrix.python-version }}
    permissions:
      security-events: write
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
       - uses: actions/checkout@v6
       
       - name: Set up Python
         uses: actions/setup-python@v6
         with:
           python-version: ${{ matrix.python-version }}
           cache: "pip"

       - name: Install pip
         run: |
           python -m pip install --upgrade pip
           pip install ansible-lint
    
       - name: Run ansible-lint
         id: lint_check
         continue-on-error: true
         run: |
           pip run ansible-lint --exclude .github proxmox -f sarif --sarif-file results.sarif
       
       - name: Show lint result
         run: |
           echo "event_name: ${{ github.event_name }}"
           echo "lint_result: ${{ steps.lint_check.outcome }}"
       
       - name: Upload SARIF file
         uses: github/codeql-action/upload-sarif@v4
         with:
           sarif_file: results.sarif

  playbook:
    needs: lint
    if: ${{ inputs.run_playbook == true }}
    runs-on:  ${{ inputs.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ needs.lint.outputs.python-version }}
          cache: "pip"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Run Ansible Playbook
        if: ${{ inputs.ansible_verbose == false }}
        run: ansible-playbook -i inventory site.yml
      
      - name: Run Ansible Playbook (verbose)
        if: ${{ inputs.ansible_verbose == true }}
        run: ansible-playbook -i inventory -vvvv site.yml
