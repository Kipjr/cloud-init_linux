name: Ansible

on: 
  push:
    paths:
      - '**.yml'
      - '**.sh'
      - '**.ps1'
    branches-ignore:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_playbook:
        description: "Run Playbook?"
        required: true
        default: false
        type: boolean
      ansible_verbose:
        description: "Verbose mode"
        required: true
        default: false
        type: boolean
jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      lint_success: ${{ steps.lint_check.outputs.lint_success }}
      python-version: ${{ matrix.python-version }}
    permissions:
      security-events: write
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install pipenv
        run: |
          python -m pip install pipenv
          
      - name: Cache pipenv
        id: cache-pipenv
        uses: actions/cache@v4
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
           
      - name: Install dependencies
        if: ${{ steps.cache-pipenv.outputs.cache-hit != 'true' }}
        run: |
          pipenv install ansible ansible-lint

      - name: Run Ansible-lint
        id: lint_check
        continue-on-error: true
        run: |
          pipenv run ansible-lint --exclude .github proxmox -f sarif > results.sarif
          echo "lint_success=$([[ $? -eq 0 ]] && echo true || echo false)" >> $GITHUB_ENV
          
      - name: Show lint success and Github Event Name
        run: | 
          echo "event_name: ${{ github.event_name }}"
          echo "lint_success: ${{ env.lint_success }}"
        
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  playbook:
    needs: lint
    if: ${{ inputs.run_playbook == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.lint.outputs.python-version }}

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Run Ansible Playbook
        if: ${{ inputs.ansible_verbose == false }}
        run: ansible-playbook -i inventory site.yml
      
      - name: Run Ansible Playbook (verbose)
        if: ${{ inputs.ansible_verbose == true }}
        run: ansible-playbook -i inventory -vvvv site.yml
