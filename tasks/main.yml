---
- name: Write gathered facts to a file
  ansible.builtin.copy:
    mode: "0644"
    content: "{{ ansible_facts | to_nice_json }}"
    dest: "/tmp/ansible_facts_{{ inventory_hostname }}.json"

- name: Get my current environment
  ansible.builtin.set_fact:
    in_pipeline: "{{ ansible_env.RUNNER_ENVIRONMENT | default('') in ['github-hosted', 'self-hosted'] }}"

- name: Display current environment
  ansible.builtin.debug:
    msg: "Running in pipeline: {{ in_pipeline }}"

- name: Include Debian 12 tasks
  ansible.builtin.include_tasks: debian12.yml
  when:
    - ansible_facts['distribution'] == "Debian"
    - ansible_facts['distribution_version'] is version("12", "==")

- name: Include Debian 13 tasks
  ansible.builtin.include_tasks: debian13.yml
  when:
    - ansible_facts['distribution'] == "Debian"
    - ansible_facts['distribution_version'] is version("13.3", "==")

- name: Include Ubuntu 22.04 tasks
  ansible.builtin.include_tasks: ubuntu2204.yml
  when:
    - ansible_facts['distribution'] == "Ubuntu"
    - ansible_facts['distribution_version'] is version("22.04", "==")

- name: Include Ubuntu 24.04 tasks
  ansible.builtin.include_tasks: ubuntu2404.yml
  when:
    - ansible_facts['distribution'] == "Ubuntu"
    - ansible_facts['distribution_version'] is version("24.04", "==")
