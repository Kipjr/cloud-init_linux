---

- name: Download the Microsoft repository key file
  ansible.builtin.get_url:
    url: "https://packages.microsoft.com/config/{{ ansible_facts['distribution'] }}/{{ {{ ansible_facts['distribution_major_version']  }} }}/packages-microsoft-prod.deb"
    dest: "/tmp/packages-microsoft-prod.deb"
    mode: "0644"

- name: Task name
  ansible.builtin.stat:
    path: "/tmp/packages-microsoft-prod.deb"
  register: msprod

- name: Register the Microsoft repository key
  become: true
  when: msprod.stat.exists
  ansible.builtin.apt:
    deb: "/tmp/packages-microsoft-prod.deb"

- name: Remove the Microsoft repository key file
  when: msprod.stat.exists
  ansible.builtin.file:
    path: "/tmp/packages-microsoft-prod.deb"
    state: absent

