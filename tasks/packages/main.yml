#    state: present

- name: Download Webmin Repo Setup
  register: webmin_repo_download
  ignore_errors: true
  when:
    - pkg_webmin
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/webmin/webmin/master/setup-repos.sh
    dest: /tmp/setup-repos.sh
    mode: '0740'

- name: Configure Webmin Repo
  when:
    - pkg_webmin
    - webmin_repo_download.state == "file"
  become: true
  args:
    creates: /etc/apt/sources.list.d/webmin.list
  ansible.builtin.shell: |
    sh /tmp/setup-repos.sh -f

- name: Ensure all packages are up to date
  become: true
  ansible.builtin.apt:
    update_cache: true

- name: Install required packages
  become: true
  ansible.builtin.apt:
    name:
      - ufw
      - ethtool
      - htop
      - screen
      - nano
      - net-tools
      - dnsutils
      - openssl
      - build-essential
      - p7zip-full
      - curl
      - gnupg
      - apt-transport-https
      - ca-certificates
      - libssl-dev
      - software-properties-common
      - openssh-server
      - uidmap
      - dbus-user-session
      - unattended-upgrades
      - pkg-config
      - powershell
      - tripwire
    state: present

- name: Install PWSH
  when: msprod.stat.exists
  become: true
  ansible.builtin.apt:
    name:
      - powershell
    state: present

- name: Install Webmin
  when:
    - pkg_webmin
  become: true
  ansible.builtin.apt:
    name:
      - webmin
    state: present

- name: Install hardware packages
  when:
    - not vm
  become: true
  ansible.builtin.apt:
    name:
      - lshw
      - hw-probe
    state: present

- name: Install SNMP
  when:
    - pkg_snmp
  become: true
  ansible.builtin.apt:
    name:
      - snmpd
      - snmp-mibs-downloader
    state: present
