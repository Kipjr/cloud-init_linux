---
- name: Set Microsoft repo variables (Debian / Ubuntu only)
  ansible.builtin.set_fact:
    ms_base: "https://packages.microsoft.com/config"
    ms_deb: "packages-microsoft-prod.deb"
    ms_repo_path: >-
      {% if ansible_facts.distribution == "Debian" %}
      debian/{{ ansible_facts['distribution_major_version'] }}
      {% elif ansible_facts.distribution == "Ubuntu" %}
      ubuntu/{{ ansible_facts['distribution_major_version'] }}
      {% else %}
      unsupported
      {% endif %}

- name: Download the Microsoft repository package
  ansible.builtin.get_url:
    url: "{{ ms_base }}/{{ ms_repo_path }}"
    dest: "/tmp/{{ ms_deb }}"
    mode: "0644"
- name: Download the Microsoft repository key file
  ansible.builtin.get_url:
    url: "{{ ms_base }}/{{ ms_repo_path }}/{{ ms_deb }}"
    dest: "/tmp/{{ ms_deb }}"
    mode: "0644"

- name: Task name
  ansible.builtin.stat:
    path: "/tmp/packages-microsoft-prod.deb"
  register: msprod

- name: Register the Microsoft repository key
  become: true
  when: msprod.stat.exists
  ansible.builtin.apt:
    deb: "/tmp/packages-microsoft-prod.deb"

- name: Remove the Microsoft repository key file
  when: msprod.stat.exists
  ansible.builtin.file:
    path: "/tmp/packages-microsoft-prod.deb"
    state: absent

# - name: Add Microsoft APT repository
